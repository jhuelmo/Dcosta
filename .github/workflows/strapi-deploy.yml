name: Deploy Strapi CMS

on:
  push:
    branches: [main]
    paths:
      - "dacosta-cms/**"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./dacosta-cms
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/dacosta-cms:latest
            ghcr.io/${{ github.repository_owner }}/dacosta-cms:${{ github.sha }}

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,REPO_OWNER
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$REPO_OWNER" --password-stdin
            docker pull "ghcr.io/$REPO_OWNER/dacosta-cms:latest"
            cd /opt/dacosta
            docker compose up -d --no-deps strapi
