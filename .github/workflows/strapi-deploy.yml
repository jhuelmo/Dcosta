name: Deploy Strapi CMS

on:
  push:
    branches: [master]
    paths:
      - "dacosta-cms/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./dacosta-cms
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/dacosta-cms:latest
            ghcr.io/${{ github.repository_owner }}/dacosta-cms:${{ github.sha }}

  deploy:
    needs: build
    runs-on: self-hosted
    permissions:
      packages: read

    steps:
      - name: Pull and restart Strapi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$REPO_OWNER" --password-stdin
          docker pull "ghcr.io/$REPO_OWNER/dacosta-cms:latest"
          cd /opt/dacosta
          docker compose up -d --no-deps strapi
