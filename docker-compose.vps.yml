# Colocar en el VPS en: /opt/dacosta/docker-compose.yml
# Crear también /opt/dacosta/.env con las variables de producción (ver .env.example de dacosta-cms)
# y un /opt/dacosta/.env con CMS_HOSTNAME=<ip-con-puntos>.sslip.io (ver README de despliegue)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  strapi:
    image: ghcr.io/jhuelmo/dacosta-cms:latest
    depends_on:
      - postgres
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 1337
      DATABASE_CLIENT: postgres
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    volumes:
      - strapi_uploads:/app/public/uploads
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - strapi
    environment:
      CMS_HOSTNAME: ${CMS_HOSTNAME}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  postgres_data:
  strapi_uploads:
  caddy_data:
  caddy_config:
